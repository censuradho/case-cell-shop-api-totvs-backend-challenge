name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start test containers
        run: docker compose -f docker-compose.test.yml up -d

      - name: Wait for containers to be healthy
        run: |
          docker compose -f docker-compose.test.yml ps
          until docker compose -f docker-compose.test.yml ps | grep -E "postgres-test.*healthy" && \
                docker compose -f docker-compose.test.yml ps | grep -E "redis-test.*healthy"; do
            echo "Waiting for containers..."; sleep 3;
          done

      - name: Run integration tests
        run: pnpm test:integration

      - name: Stop test containers
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: case-cell-shop-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
